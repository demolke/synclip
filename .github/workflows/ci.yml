name: CI

# Run the SynClip test suite on every push and pull request.
on:
  push:
  pull_request:
  workflow_dispatch:

# Cancel superseded runs on the same ref
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    name: Tests (Python ${{ matrix.python-version }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11"]

    env:
      # Headless Qt + silent audio
      QT_QPA_PLATFORM: offscreen
      SDL_AUDIODRIVER: dummy
      BLENDER_VERSION: "5.1.2"
      GODOT_VERSION: "4.7-stable"

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip
          cache-dependency-path: synclip/requirements.txt

      - name: Install system libraries
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libegl1 libgl1 libegl-mesa0 libgl1-mesa-dri libopengl0 \
            libxkbcommon0 libdbus-1-3 libglib2.0-0

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r synclip/requirements.txt

      - name: Cache Blender & Godot
        id: cache-tools
        uses: actions/cache@v4
        with:
          path: ~/tools
          key: tools-blender-${{ env.BLENDER_VERSION }}-godot-${{ env.GODOT_VERSION }}

      - name: Download Blender & Godot
        if: steps.cache-tools.outputs.cache-hit != 'true'
        run: |
          set -euo pipefail
          mkdir -p "$HOME/tools"
          cd "$HOME/tools"
          blender_major="${BLENDER_VERSION%.*}"
          curl -sSL -o blender.tar.xz \
            "https://download.blender.org/release/Blender${blender_major}/blender-${BLENDER_VERSION}-linux-x64.tar.xz"
          tar -xf blender.tar.xz
          rm blender.tar.xz
          # Godot 4.7
          curl -sSL -o godot.zip \
            "https://github.com/godotengine/godot/releases/download/${GODOT_VERSION}/Godot_v${GODOT_VERSION}_linux.x86_64.zip"
          unzip -o godot.zip
          rm godot.zip
          chmod +x "Godot_v${GODOT_VERSION}_linux.x86_64"

      - name: Run tests
        run: |
          export BLENDER="$HOME/tools/blender-${BLENDER_VERSION}-linux-x64/blender"
          export GODOT="$HOME/tools/Godot_v${GODOT_VERSION}_linux.x86_64"
          chmod +x "$GODOT" || true
          bash run_tests.sh -v
